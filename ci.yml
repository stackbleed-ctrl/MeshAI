name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── SVG health check ──────────────────────────────────────────────────────
  validate-svg:
    name: Validate SVG assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Check SVG files are well-formed XML
        run: |
          EXIT=0
          for f in $(find . -name "*.svg" -not -path "*/node_modules/*"); do
            echo "Checking $f"
            if ! xmllint --noout "$f" 2>&1; then
              echo "❌  FAIL: $f is not valid XML"
              EXIT=1
            fi
          done
          exit $EXIT

      - name: Check SVGs have viewBox and xmlns
        run: |
          EXIT=0
          for f in $(find . -name "*.svg" -not -path "*/node_modules/*"); do
            if ! grep -q 'viewBox' "$f"; then
              echo "❌  MISSING viewBox: $f"
              EXIT=1
            fi
            if ! grep -q 'xmlns=' "$f"; then
              echo "❌  MISSING xmlns: $f"
              EXIT=1
            fi
          done
          exit $EXIT

      - name: Block SVGs with <script> tags (XSS guard)
        run: |
          EXIT=0
          for f in $(find . -name "*.svg" -not -path "*/node_modules/*"); do
            if grep -qi '<script' "$f"; then
              echo "❌  SECURITY: <script> found in $f"
              EXIT=1
            fi
          done
          exit $EXIT

      - name: ✅ All SVG checks passed
        run: echo "All SVG files are valid."

  # ── Android build ─────────────────────────────────────────────────────────
  build:
    name: Build & Test (Android)
    runs-on: ubuntu-latest
    needs: validate-svg

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshai-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/**.apk
          retention-days: 14
